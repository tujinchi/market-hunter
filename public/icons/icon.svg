<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="12" y="12" width="488" height="488" rx="88" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.4"/>
  <!-- Eagle / Hunter icon -->
  <g transform="translate(256,180)">
    <!-- Body -->
    <path d="M-40,80 Q-60,40 -30,0 L30,0 Q60,40 40,80 Z" fill="url(#accent)" opacity="0.9"/>
    <!-- Wings -->
    <path d="M-30,10 Q-120,-50 -100,-30 Q-80,-10 -30,20" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M30,10 Q120,-50 100,-30 Q80,-10 30,20" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="0" cy="-15" r="25" fill="url(#accent)" opacity="0.95"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-20" r="6" fill="#fff"/>
    <circle cx="10" cy="-20" r="6" fill="#fff"/>
    <circle cx="-10" cy="-20" r="3" fill="#080c14"/>
    <circle cx="10" cy="-20" r="3" fill="#080c14"/>
    <!-- Beak -->
    <path d="M-5,-10 L0,-2 L5,-10" fill="#fbbf24"/>
  </g>
  <!-- Radar/Scan lines -->
  <g opacity="0.15">
    <circle cx="256" cy="340" r="60" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="256" cy="340" r="90" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="256" cy="340" r="120" fill="none" stroke="#3b82f6" stroke-width="1"/>
  </g>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="900" fill="url(#accent)">市场猎手</text>
</svg>
